<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026년 6월 매출 진단 — TU게더</title>
  <meta name="description" content="2026년 6월 전체·국내·해외 매출·상담·동의율·객단가 및 경로별 특이사항 진단 (누적 영업일 21일 기준)">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', sans-serif;
      background: #F4F4F4;
      color: #1A1612;
      min-height: 100vh;
      padding: 32px 24px 80px;
    }
    .page-header {
      max-width: 1100px;
      margin: 0 auto 32px;
    }
    .page-title {
      font-size: 11px;
      font-weight: 600;
      color: #808080;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .page-header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1A1612;
      letter-spacing: -0.4px;
    }
    .page-header .sub {
      font-size: 13px;
      color: #808080;
      margin-top: 8px;
    }
    .badge {
      display: inline-block;
      background: #1A1612;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 9999px;
      margin-right: 6px;
      letter-spacing: 0.4px;
    }

    .section-label {
      max-width: 1100px;
      margin: 36px auto 14px;
      font-size: 11px;
      font-weight: 700;
      color: #808080;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E9E9E9;
    }

    /* ── KPI CARDS ── */
    .cards-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px 16px 16px;
      border: 1.5px solid #E9E9E9;
    }
    .card .kpi-label {
      font-size: 10px;
      font-weight: 700;
      color: #B4B4B4;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .card .kpi-value {
      font-size: 20px;
      font-weight: 700;
      color: #1A1612;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .card .kpi-value span { font-size: 12px; font-weight: 500; color: #808080; margin-left: 1px; }
    .card .compare-row { display: flex; flex-direction: column; gap: 5px; }
    .card .compare-item { display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
    .card .clabel { color: #B4B4B4; font-weight: 500; }
    .card .cdelta { font-weight: 700; font-size: 10.5px; }
    .up { color: #D7263D; }
    .down { color: #1D6FCC; }
    .flat { color: #D4860B; }

    .seg-divider {
      max-width: 1100px;
      margin: 28px auto 0;
      border: none;
      border-top: 1.5px solid #E9E9E9;
    }

    /* ── TABLE ── */
    .table-wrap { max-width: 1100px; margin: 0 auto; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 16px; overflow: hidden; font-size: 12.5px; }
    thead tr { background: #1A1612; color: #fff; }
    thead th { padding: 11px 14px; text-align: center; font-weight: 600; font-size: 11px; letter-spacing: 0.4px; white-space: nowrap; }
    thead th:first-child { text-align: left; }
    tbody tr { border-bottom: 1px solid #F4F4F4; }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 11px 14px; text-align: center; color: #1A1612; font-weight: 500; white-space: nowrap; }
    tbody td:first-child { text-align: left; font-weight: 600; color: #4F4F4F; }
    .td-main { font-weight: 700 !important; color: #1A1612 !important; }
    .td-up { color: #D7263D; font-weight: 700; }
    .td-down { color: #1D6FCC; font-weight: 700; }
    .td-flat { color: #D4860B; font-weight: 700; }

    /* ── CHANNEL TABLE ── */
    .channel-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .ch-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
    }
    .ch-card-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #F4F4F4;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ch-card-header h3 { font-size: 13px; font-weight: 700; color: #1A1612; }
    .ch-tag {
      font-size: 10px; font-weight: 700; padding: 2px 8px;
      border-radius: 9999px; letter-spacing: 0.4px;
    }
    .tag-red { background: #FFF0F1; color: #D7263D; }
    .tag-blue { background: #EBF2FF; color: #1D6FCC; }
    .tag-green { background: #F0FFF4; color: #16A34A; }
    .tag-amber { background: #FFF8E7; color: #D4860B; }
    .tag-gray { background: #F4F4F4; color: #808080; }
    .ch-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .ch-table th { padding: 8px 12px; text-align: right; font-size: 10px; font-weight: 700; color: #B4B4B4; letter-spacing: 0.5px; text-transform: uppercase; }
    .ch-table th:first-child { text-align: left; }
    .ch-table td { padding: 9px 12px; text-align: right; border-top: 1px solid #F4F4F4; color: #1A1612; font-weight: 500; }
    .ch-table td:first-child { text-align: left; font-weight: 600; }
    .ch-table tr.highlight { background: #FFFBF0; }
    .ch-table tr.highlight td:first-child { color: #D4860B; }

    /* ── INSIGHT ── */
    .insight-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .ins-card {
      background: #fff;
      border-radius: 16px;
      padding: 22px 20px;
      border-left: 4px solid #E9E9E9;
    }
    .ins-card.alert { border-left-color: #D7263D; }
    .ins-card.warn  { border-left-color: #1D6FCC; }
    .ins-card.ok    { border-left-color: #16A34A; }
    .ins-card.amber { border-left-color: #D4860B; }
    .ins-card h3 { font-size: 13px; font-weight: 700; color: #1A1612; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .ins-card p { font-size: 12.5px; color: #4F4F4F; line-height: 1.75; }
    .ins-card strong { color: #1A1612; font-weight: 700; }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="page-header">
  <div class="page-title">TU게더 · 월간 매출 진단</div>
  <h1>2026년 6월 국내 / 해외 매출 진단</h1>
  <p class="sub">
    <span class="badge">누적 영업일 21일 기준</span>
    전월(5월) 동기 및 직전 3개월(2·3·4월) 동기 평균 비교
  </p>
</div>

<!-- ── 전체 ── -->
<div class="section-label">전체 (Total)</div>
<div class="cards-grid" id="cards-total"></div>

<hr class="seg-divider" style="margin-top:24px; margin-bottom:24px;">

<!-- ── 국내 ── -->
<div class="section-label" style="margin-top:0;">국내 (Domestic)</div>
<div class="cards-grid" id="cards-dom"></div>

<hr class="seg-divider" style="margin-top:24px; margin-bottom:24px;">

<!-- ── 해외 ── -->
<div class="section-label" style="margin-top:0;">해외 (Overseas)</div>
<div class="cards-grid" id="cards-glb"></div>

<hr class="seg-divider" style="margin-top:28px; margin-bottom:28px;">

<!-- ── 종합 비교표 ── -->
<div class="section-label" style="margin-top:0;">종합 비교표</div>
<div class="table-wrap">
  <table id="summary-table"></table>
</div>

<hr class="seg-divider" style="margin-top:28px; margin-bottom:28px;">

<!-- ── 경로별 특이사항 ── -->
<div class="section-label" style="margin-top:0;">경로별 특이사항</div>
<div class="channel-grid" id="channel-grid"></div>

<hr class="seg-divider" style="margin-top:28px; margin-bottom:28px;">

<!-- ── 진단 요약 ── -->
<div class="section-label" style="margin-top:0;">진단 요약</div>
<div class="insight-grid" id="insight-grid"></div>


<!-- ── SCRIPT (DOM 아래) ── -->
<script>
(function(){

/* ─── 헬퍼 ─── */
function sd(a,b){ return b===0?0:a/b; }
function rate(a,b){ return sd(a-b,b)*100; }
function consentRate(c,d){ return sd(c,d)*100; }

function delta_rev(cur,base){
  var r=rate(cur,base), v=cur-base, sym=r>0?'▲':r<0?'▼':'-', cls=r>0?'up':r<0?'down':'flat';
  return {cls:cls,txt:sym+Math.abs(r).toFixed(1)+'%_'+sym+Math.abs(v).toFixed(2)+'억'};
}
function delta_cnt(cur,base){
  var r=rate(cur,base), v=cur-base, sym=r>0?'▲':r<0?'▼':'-', cls=r>0?'up':r<0?'down':'flat';
  return {cls:cls,txt:sym+Math.abs(r).toFixed(1)+'%_'+sym+Math.round(Math.abs(v))+'건'};
}
function delta_rate(cur,base){
  var v=cur-base, sym=v>0?'▲':v<0?'▼':'-', cls=v>0?'up':v<0?'down':'flat';
  return {cls:cls,txt:sym+Math.abs(v).toFixed(1)+'%p'};
}
function delta_arp(cur,base){
  var r=rate(cur,base), v=cur-base, sym=r>0?'▲':r<0?'▼':'-', cls=r>0?'up':r<0?'down':'flat';
  return {cls:cls,txt:sym+Math.abs(r).toFixed(1)+'%_'+sym+Math.round(Math.abs(v))+'만'};
}

/* ─── 원본 데이터 ─── */
var D = {
  total:{
    cur: {rev:13.1153,consult:275,consent:195,denom:264,arp:714.01},
    prev:{rev:13.5391,consult:230,consent:163,denom:210,arp:730.75},
    m3:  {rev:15.6746,consult:299.67,consent:209.67,rate:0.7506,arp:722.79}
  },
  dom:{
    cur: {rev:8.0807,consult:211,consent:143,denom:201,arp:580.21},
    prev:{rev:9.7655,consult:193,consent:133,denom:173,arp:625.26},
    m3:  {rev:10.1408,consult:246.67,consent:167.67,rate:0.7332,arp:561.04}
  },
  glb:{
    cur: {rev:5.0345,consult:64,consent:52,denom:63,arp:1081.96},
    prev:{rev:3.7736,consult:37,consent:30,denom:37,arp:1198.43},
    m3:  {rev:5.5338,consult:53.0,consent:42.0,rate:0.8289,arp:1368.50}
  }
};

/* ─── 스코어카드 렌더 ─── */
function renderCards(key, id){
  var S=D[key];
  var cr=consentRate(S.cur.consent,S.cur.denom);
  var pr=consentRate(S.prev.consent,S.prev.denom);
  var mr=S.m3.rate*100;
  var cards=[
    {label:'매출',     val:S.cur.rev.toFixed(2),    unit:'억',
     d1:delta_rev(S.cur.rev,S.prev.rev), d2:delta_rev(S.cur.rev,S.m3.rev)},
    {label:'상담수',   val:S.cur.consult,            unit:'건',
     d1:delta_cnt(S.cur.consult,S.prev.consult), d2:delta_cnt(S.cur.consult,S.m3.consult)},
    {label:'동의수',   val:S.cur.consent,            unit:'건',
     d1:delta_cnt(S.cur.consent,S.prev.consent), d2:delta_cnt(S.cur.consent,S.m3.consent)},
    {label:'동의율',   val:cr.toFixed(1),            unit:'%',
     d1:delta_rate(cr,pr), d2:delta_rate(cr,mr)},
    {label:'객단가',   val:S.cur.arp.toFixed(0),     unit:'만',
     d1:delta_arp(S.cur.arp,S.prev.arp), d2:delta_arp(S.cur.arp,S.m3.arp)}
  ];
  var h='';
  cards.forEach(function(c){
    h+='<div class="card">';
    h+='<div class="kpi-label">'+c.label+'</div>';
    h+='<div class="kpi-value">'+c.val+'<span>'+c.unit+'</span></div>';
    h+='<div class="compare-row">';
    h+='<div class="compare-item"><span class="clabel">전월 동기</span><span class="cdelta '+c.d1.cls+'">'+c.d1.txt+'</span></div>';
    h+='<div class="compare-item"><span class="clabel">3개월 평균</span><span class="cdelta '+c.d2.cls+'">'+c.d2.txt+'</span></div>';
    h+='</div></div>';
  });
  document.getElementById(id).innerHTML=h;
}
renderCards('total','cards-total');
renderCards('dom','cards-dom');
renderCards('glb','cards-glb');

/* ─── 종합 비교표 ─── */
(function(){
  function makeRows(key, label){
    var S=D[key];
    var cr=consentRate(S.cur.consent,S.cur.denom);
    var pr=consentRate(S.prev.consent,S.prev.denom);
    var mr=S.m3.rate*100;
    return [
      {seg:label+' 매출',   cur:S.cur.rev.toFixed(2),  prev:S.prev.rev.toFixed(2), m3:S.m3.rev.toFixed(2),
       d1:delta_rev(S.cur.rev,S.prev.rev), d2:delta_rev(S.cur.rev,S.m3.rev)},
      {seg:label+' 상담수', cur:S.cur.consult,          prev:S.prev.consult,        m3:S.m3.consult.toFixed(1),
       d1:delta_cnt(S.cur.consult,S.prev.consult), d2:delta_cnt(S.cur.consult,S.m3.consult)},
      {seg:label+' 동의수', cur:S.cur.consent,          prev:S.prev.consent,        m3:S.m3.consent.toFixed(1),
       d1:delta_cnt(S.cur.consent,S.prev.consent), d2:delta_cnt(S.cur.consent,S.m3.consent)},
      {seg:label+' 동의율', cur:cr.toFixed(1)+'%',      prev:pr.toFixed(1)+'%',     m3:mr.toFixed(1)+'%',
       d1:delta_rate(cr,pr), d2:delta_rate(cr,mr)},
      {seg:label+' 객단가', cur:S.cur.arp.toFixed(0),   prev:S.prev.arp.toFixed(0), m3:S.m3.arp.toFixed(0),
       d1:delta_arp(S.cur.arp,S.prev.arp), d2:delta_arp(S.cur.arp,S.m3.arp)}
    ];
  }
  var divider={seg:'─',cur:'',prev:'',m3:'',d1:{cls:'flat',txt:''},d2:{cls:'flat',txt:''}};
  var rows=[].concat(makeRows('total','전체'),[divider]).concat(makeRows('dom','국내'),[divider]).concat(makeRows('glb','해외'));
  var h='<thead><tr><th>구분</th><th>6월 (21일)</th><th>5월 동기</th><th>전월 대비</th><th>직전 3개월 평균</th><th>3개월 대비</th></tr></thead><tbody>';
  rows.forEach(function(r){
    if(r.seg==='─'){h+='<tr style="background:#F4F4F4;"><td colspan="6" style="height:6px;padding:0;"></td></tr>';return;}
    h+='<tr><td>'+r.seg+'</td><td class="td-main">'+r.cur+'</td><td>'+r.prev+'</td>';
    h+='<td class="td-'+r.d1.cls+'">'+r.d1.txt+'</td><td>'+r.m3+'</td><td class="td-'+r.d2.cls+'">'+r.d2.txt+'</td></tr>';
  });
  h+='</tbody>';
  document.getElementById('summary-table').innerHTML=h;
})();

/* ─── 경로별 특이사항 ─── */
(function(){
  // 국내 주요 경로 6월 vs 5월 vs 3개월평균 (억 단위)
  // 인콜
  var domChannels=[
    {name:'네이버예약', cat:'인콜', tag:'tag-red', tagTxt:'▼이슈',
     data:[
       {m:'2월',rev:2.28},{m:'3월',rev:1.94},{m:'4월',rev:1.80},{m:'5월',rev:2.02},{m:'6월',rev:1.33}
     ],
     note:'5월 2.02억 → 6월 1.33억 (▼34.2%). 3개월 평균 2.01억 대비 ▼33.8%. 가장 큰 단일 경로 이탈.'},
    {name:'홈페이지', cat:'인콜', tag:'tag-amber', tagTxt:'▼주의',
     data:[
       {m:'2월',rev:0.91},{m:'3월',rev:1.10},{m:'4월',rev:0.76},{m:'5월',rev:1.02},{m:'6월',rev:0.81}
     ],
     note:'6월 0.81억. 3개월 평균 0.93억 대비 ▼13%. 상담수 21건으로 볼륨 자체가 줄었음.'},
    {name:'자체광고', cat:'아웃콜', tag:'tag-amber', tagTxt:'▼주의',
     data:[
       {m:'2월',rev:0.76},{m:'3월',rev:0.79},{m:'4월',rev:0.27},{m:'5월',rev:0.52},{m:'6월',rev:0.54}
     ],
     note:'4월 급락 이후 회복 중이나 2~3월 수준(0.76~0.79억) 미복귀. 동의율 68.8%로 하락.'},
    {name:'강남언니', cat:'아웃콜', tag:'tag-green', tagTxt:'▲양호',
     data:[
       {m:'2월',rev:0.73},{m:'3월',rev:0.52},{m:'4월',rev:0.33},{m:'5월',rev:0.63},{m:'6월',rev:0.71}
     ],
     note:'6월 0.71억으로 전월 대비 ▲12.5% 회복, 3개월 평균(0.53억) 대비 ▲33.5%. 상담수도 23건으로 증가.'},
    {name:'네이버검색', cat:'인콜', tag:'tag-red', tagTxt:'▼이슈',
     data:[
       {m:'2월',rev:1.24},{m:'3월',rev:0.43},{m:'4월',rev:0.47},{m:'5월',rev:1.08},{m:'6월',rev:0.34}
     ],
     note:'6월 0.34억으로 5월(1.08억) 대비 ▼68.5% 급락. 월간 변동성이 심한 경로이나 이번 달 낙폭 과대.'},
    {name:'일본상담회', cat:'해외 아웃콜', tag:'tag-green', tagTxt:'▲양호',
     data:[
       {m:'2월',rev:1.53},{m:'3월',rev:1.38},{m:'4월',rev:2.00},{m:'5월',rev:1.46},{m:'6월',rev:1.88}
     ],
     note:'6월 1.88억으로 전월(1.46억) 대비 ▲28.8% 회복. 객단가 1,576만으로 안정적. 13건 전원 동의.'},
    {name:'인스타그램(일본)', cat:'해외 아웃콜', tag:'tag-green', tagTxt:'▲급등',
     data:[
       {m:'2월',rev:0.35},{m:'3월',rev:0.56},{m:'4월',rev:1.76},{m:'5월',rev:0.74},{m:'6월',rev:1.01}
     ],
     note:'6월 1.01억으로 5월(0.74억) 대비 ▲36.5%. 7건 전원 동의, 객단가 1,564만으로 고단가 유지.'},
    {name:'왓츠앱(미국+기타)', cat:'해외 인콜', tag:'tag-amber', tagTxt:'▲볼륨/▼단가',
     data:[
       {m:'2월',rev:0.21},{m:'3월',rev:0.45},{m:'4월',rev:1.15},{m:'5월',rev:0.00},{m:'6월',rev:0.71}
     ],
     note:'6월 왓츠앱 합산 0.70억(미국 0.39+기타 0.31). 상담 10건 중 동의 6건(60%). 객단가가 낮아 볼륨 대비 매출 기여 제한적.'}
  ];

  var maxRevMap={};
  domChannels.forEach(function(ch){
    var max=Math.max.apply(null,ch.data.map(function(d){return d.rev;}));
    maxRevMap[ch.name]=max||1;
  });

  var colors={
    '인콜':'#1A1612','아웃콜':'#4F4F4F','해외 아웃콜':'#FF4500','해외 인콜':'#FF9466'
  };

  var h='';
  domChannels.forEach(function(ch){
    var color=colors[ch.cat]||'#808080';
    h+='<div class="ch-card">';
    h+='<div class="ch-card-header"><h3>'+ch.name+'</h3><span class="ch-tag '+ch.tag+'">'+ch.tagTxt+'</span><span class="ch-tag tag-gray" style="margin-left:auto;">'+ch.cat+'</span></div>';

    // 미니 바 차트
    h+='<div style="padding:14px 16px 10px;">';
    var maxR=maxRevMap[ch.name];
    ch.data.forEach(function(d){
      var pct=Math.max((d.rev/maxR*100),2).toFixed(1);
      var isCur=d.m==='6월';
      var barColor=isCur?color:'#E9E9E9';
      var textColor=isCur?'#1A1612':'#808080';
      var fw=isCur?'700':'500';
      h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">';
      h+='<span style="font-size:10px;font-weight:600;color:'+textColor+';width:24px;text-align:right;">'+d.m+'</span>';
      h+='<div style="flex:1;height:18px;background:#F4F4F4;border-radius:5px;overflow:hidden;">';
      h+='<div style="width:'+pct+'%;height:100%;background:'+barColor+';border-radius:5px;display:flex;align-items:center;padding-left:6px;">';
      if(d.rev>=0.3) h+='<span style="font-size:10px;font-weight:700;color:'+(isCur?'#fff':'#B4B4B4')+';">'+d.rev.toFixed(2)+'</span>';
      h+='</div></div>';
      h+='<span style="font-size:10px;font-weight:'+fw+';color:'+textColor+';width:32px;text-align:right;">'+d.rev.toFixed(2)+'억</span>';
      h+='</div>';
    });
    h+='</div>';

    // 노트
    h+='<div style="padding:0 16px 14px;font-size:11.5px;color:#4F4F4F;line-height:1.65;border-top:1px solid #F4F4F4;padding-top:10px;">'+ch.note+'</div>';
    h+='</div>';
  });

  document.getElementById('channel-grid').innerHTML=h;
})();
