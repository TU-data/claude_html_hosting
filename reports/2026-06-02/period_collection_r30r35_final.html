
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.wrap{padding:1.2rem 2rem 1.8rem;font-family:sans-serif;max-width:930px;margin:0 auto;}
.top-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.period-badge{font-size:13px;font-weight:500;color:#1D6FCC;background:#E6F1FB;padding:5px 14px;border-radius:20px;}
.note{font-size:12px;color:#888;background:#f7f7f5;border-left:3px solid #ccc;border-radius:0 5px 5px 0;padding:7px 12px;margin-bottom:12px;}
.sec-hd{font-size:12px;font-weight:500;color:#888;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;}
.chart-section{margin-bottom:1.4rem;}
.chart-box{position:relative;height:320px;width:100%;}
.legend-wrap{margin-bottom:12px;}
.legend-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:5px;}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;color:#333;}
.leg-line{width:22px;height:3px;border-radius:2px;flex-shrink:0;}
.kpi-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.3rem;}
.kpi{background:#f0f0ee;border-radius:8px;padding:13px 15px;}
.kpi-name{font-size:11.5px;font-weight:500;margin-bottom:7px;}
.kpi-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;gap:6px;}
.kpi-label{font-size:11px;color:#888;}
.kpi-val{font-size:13px;font-weight:500;color:#1a1a1a;}
.kpi-slope{font-size:11.5px;}
.kpi-may{font-size:12px;font-weight:500;}
.divider{border:none;border-top:0.5px solid #ddd;margin:6px 0;}
.est-val{font-size:11px;color:#888;}
.may-badge{font-size:10px;font-weight:500;background:#E6F1FB;color:#1D6FCC;padding:1px 6px;border-radius:8px;margin-bottom:4px;display:inline-block;}
</style>

<div class="wrap">
  <div class="top-bar">
    <span class="period-badge">2026.02.01 ~ 2026.05.31 · R30~R35</span>
  </div>
  <div class="note">평균 기울기 = 최종 누적값 ÷ 마지막 이벤트 경과일 × 7. 점선 = 기울기선. 세로 점선 = 각 회차 개최 마지막날.</div>

  <div class="kpi-grid" id="kpi-grid"></div>

  <div class="legend-wrap">
    <div class="legend-row" id="legend-row"></div>
    <div style="display:flex;gap:16px;margin-top:4px;">
      <div class="leg"><div style="width:22px;height:0;border-top:2px dashed #bbb;flex-shrink:0;"></div><span style="font-size:12px;color:#888;">평균 기울기선</span></div>
      <div class="leg"><div style="width:2px;height:14px;border-left:2px dashed #bbb;"></div><span style="font-size:12px;color:#888;">개최 마지막날</span></div>
    </div>
  </div>

  <div class="chart-section">
    <div class="sec-hd">누적 회수율 (%) + 평균 기울기선</div>
    <div class="chart-box"><canvas id="rChart"></canvas></div>
  </div>

  <div class="chart-section">
    <div class="sec-hd">누적 회수금액 (만원) + 평균 기울기선</div>
    <div class="chart-box"><canvas id="aChart"></canvas></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<script>
(function(){
  var meta={
    30:{loc:'오사카',  dates:'26.02.07~08', lastDay:7},
    31:{loc:'도쿄',    dates:'26.03.07~08', lastDay:35},
    32:{loc:'후쿠오카',dates:'26.03.22',    lastDay:49},
    33:{loc:'오사카',  dates:'26.04.04~05', lastDay:63},
    34:{loc:'홋카이도',dates:'26.04.19',    lastDay:77},
    35:{loc:'도쿄',    dates:'26.05.23~24', lastDay:112}
  };
  function lbl(r){return 'R'+r+' · '+meta[r].loc+' · '+meta[r].dates;}
  var COLORS={30:'#D85A30',31:'#D4537E',32:'#639922',33:'#378ADD',34:'#BA7517',35:'#888780'};
  var ROUNDS=[30,31,32,33,34,35];
  var EST_MAN={30:53606,31:39041,32:24649,33:37830,34:9135,35:38038};

  var pd={
    30:[[15,5.04,0.2699],[16,9.28,0.4976],[18,12.98,0.6956],[27,16.44,0.8811],
        [31,18.7,1.0026],[32,25.34,1.3583],[41,25.89,1.388],[44,32.44,1.7389],
        [47,33.42,1.7917],[53,34.27,1.8372],[57,43.14,2.3124],[64,44.6,2.3907],
        [95,47.39,2.5403],[115,47.57,2.5502]],
    31:[[53,1.92,0.0748],[55,7.31,0.2856],[56,12.06,0.4708],[65,13.97,0.5456],
        [68,15.73,0.6142],[69,19.34,0.755],[79,21.1,0.8237],[83,29.89,1.1669],
        [92,34.35,1.3411],[108,36.15,1.4115]],
    32:[[54,2.46,0.0607],[71,4.93,0.1214],[81,5.33,0.1313],[82,5.48,0.135],
        [85,10.83,0.267],[100,13.11,0.3231]],
    33:[[66,6.75,0.2554],[67,10.12,0.3829],[75,12.89,0.4876],[81,21.63,0.8183],
        [86,30.16,1.1408],[87,30.26,1.1447],[95,35.49,1.3427],[97,41.03,1.5521],
        [108,49.87,1.8865]],
    34:[[114,31.07,0.2838]],
    35:[[115,3.68,0.1399],[116,7.13,0.2713]]
  };

  function eokToMan(v){return Math.round(v*10000);}

  // 5월 증가분: Apr 30 = day 88 기준
  function getMayData(r){
    var apr30=88, rBase=0, eBase=0;
    pd[r].forEach(function(e){if(e[0]<=apr30){rBase=e[1];eBase=e[2];}});
    var last=pd[r][pd[r].length-1];
    return{rateInc:+(last[1]-rBase).toFixed(2), amountMan:Math.round((last[2]-eBase)*10000)};
  }

  function slope(r,metric){
    var last=pd[r][pd[r].length-1];
    var d=last[0],raw=metric==='rate'?last[1]:eokToMan(last[2]);
    return{perWeek:(raw/d)*7,lastDay:d,finalVal:raw};
  }
  function dayToLabel(d){
    var ms=[0,28,59,89,120],mn=['2','3','4','5'];
    for(var i=0;i<ms.length-1;i++){if(d<ms[i+1])return mn[i]+'/'+(d-ms[i]+1);}
    return '5/31';
  }

  var TICK_VALS=[0,28,59,89,119];
  var TICK_LABELS={0:'2/1',28:'3/1',59:'4/1',89:'5/1',119:'5/31'};

  function hexToRgba(hex,a){
    var n=parseInt(hex.slice(1),16);
    return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';
  }

  // 개최일 annotation 생성 (두 차트 공용)
  function makeAnnotations(maxY){
    var annos={};
    // yAdjust: 겹침 방지용 교번 오프셋 (픽셀)
    var offsets={30:0, 31:40, 32:0, 33:40, 34:0, 35:0};
    ROUNDS.forEach(function(r){
      var c=COLORS[r];
      var dateLabel=meta[r].dates.slice(-5).replace('~','').trim();
      // 마지막날만 추출: 26.02.07~08 → "08" → "2/8"
      var parts=meta[r].dates.split('~');
      var lastPart=parts[parts.length-1]; // e.g. "08" or "26.04.19"
      // short date for label
      var shortDate=meta[r].dates.indexOf('~')>-1
        ? dayToLabel(meta[r].lastDay)
        : dayToLabel(meta[r].lastDay);

      annos['vline'+r]={
        type:'line',
        xMin:meta[r].lastDay, xMax:meta[r].lastDay,
        borderColor:hexToRgba(c,0.55),
        borderWidth:1.5,
        borderDash:[4,3],
        label:{
          display:true,
          content:['R'+r, shortDate],
          position:0.03,
          yAdjust:offsets[r],
          backgroundColor:'rgba(255,255,255,0.85)',
          color:c,
          font:{size:9,weight:'500'},
          padding:{top:2,bottom:2,left:3,right:3},
          borderRadius:3
        }
      };
    });
    return annos;
  }

  function buildDatasets(metric){
    var ds=[];
    ROUNDS.forEach(function(r){
      var c=COLORS[r];
      var toY=metric==='rate'?function(v){return v;}:eokToMan;
      var pts=[{x:0,y:0}];
      pd[r].forEach(function(e){pts.push({x:e[0],y:toY(metric==='rate'?e[1]:e[2])});});
      var last=pts[pts.length-1];
      if(last.x<119)pts.push({x:119,y:last.y});
      ds.push({
        label:lbl(r),data:pts,
        borderColor:c,borderWidth:2.5,backgroundColor:'transparent',
        stepped:'before',
        pointRadius:pts.map(function(p,i){return(i===0||i===pts.length-1)?0:4;}),
        pointBackgroundColor:c,pointBorderColor:'#fff',pointBorderWidth:1.5,
        fill:false,_type:'traj'
      });
      var s=slope(r,metric);
      ds.push({
        label:'_sl_'+r,data:[{x:0,y:0},{x:s.lastDay,y:s.finalVal}],
        borderColor:hexToRgba(c,0.4),borderWidth:1.5,borderDash:[5,4],
        backgroundColor:'transparent',stepped:false,pointRadius:0,fill:false,_type:'slope'
      });
    });
    return ds;
  }

  function makeXConfig(){
    return{
      type:'linear',min:0,max:119,grid:{color:'rgba(0,0,0,0.05)'},
      afterBuildTicks:function(axis){axis.ticks=TICK_VALS.map(function(v){return{value:v};});},
      ticks:{color:'#666',font:{size:11},callback:function(v){return TICK_LABELS[v]||null;}},
      title:{display:true,text:'2026년',font:{size:11},color:'#888'}
    };
  }
  function tooltipCfg(metric){return{
    mode:'nearest',intersect:false,
    filter:function(i){return i.dataset._type==='traj';},
    callbacks:{
      title:function(it){return it[0].dataset.label;},
      label:function(it){
        var v=it.parsed.y;
        return dayToLabel(it.parsed.x)+' → '+(metric==='rate'?v.toFixed(1)+'%':v.toLocaleString()+'만원');
      }
    },
    backgroundColor:'rgba(20,20,20,0.88)',titleFont:{size:12},bodyFont:{size:11},padding:10
  };}

  new Chart(document.getElementById('rChart').getContext('2d'),{
    type:'line',data:{datasets:buildDatasets('rate')},
    options:{
      responsive:true,maintainAspectRatio:false,parsing:false,animation:{duration:350},
      scales:{
        x:makeXConfig(),
        y:{min:0,max:55,grid:{color:'rgba(0,0,0,0.05)'},
          ticks:{color:'#666',font:{size:11},callback:function(v){return v+'%';}},
          title:{display:true,text:'누적 회수율 (%)',font:{size:11},color:'#888'}}
      },
      plugins:{
        legend:{display:false},
        tooltip:tooltipCfg('rate'),
        annotation:{annotations:makeAnnotations(55)}
      }
    }
  });

  new Chart(document.getElementById('aChart').getContext('2d'),{
    type:'line',data:{datasets:buildDatasets('eok')},
    options:{
      responsive:true,maintainAspectRatio:false,parsing:false,animation:{duration:350},
      scales:{
        x:makeXConfig(),
        y:{min:0,grid:{color:'rgba(0,0,0,0.05)'},
          ticks:{color:'#666',font:{size:11},callback:function(v){return v.toLocaleString()+'만';}},
          title:{display:true,text:'누적 회수금액 (만원)',font:{size:11},color:'#888'}}
      },
      plugins:{
        legend:{display:false},
        tooltip:tooltipCfg('eok'),
        annotation:{annotations:makeAnnotations(30000)}
      }
    }
  });

  // 범례
  var legHtml='';
  ROUNDS.forEach(function(r){
    legHtml+='<div class="leg"><div class="leg-line" style="background:'+COLORS[r]+';"></div>'+lbl(r)+'</div>';
  });
  document.getElementById('legend-row').innerHTML=legHtml;

  // KPI (5월 데이터 추가)
  var kpiHtml='';
  ROUNDS.forEach(function(r){
    var sr=slope(r,'rate'),sa=slope(r,'eok');
    var may=getMayData(r);
    var c=COLORS[r],single=pd[r].length===1;
    var finalRate=pd[r][pd[r].length-1][1];
    kpiHtml+='<div class="kpi">';
    kpiHtml+='<div class="kpi-name" style="color:'+c+'">'+lbl(r)+'</div>';
    kpiHtml+='<div class="kpi-row"><span class="kpi-label">예약 견적 합계</span><span class="est-val">'+EST_MAN[r].toLocaleString()+'만원</span></div>';
    kpiHtml+='<div class="divider"></div>';
    kpiHtml+='<div class="kpi-row"><span class="kpi-label">최종 회수율</span><span class="kpi-val">'+finalRate.toFixed(1)+'%</span></div>';
    kpiHtml+='<div class="kpi-row"><span class="kpi-label">기울기 (율)</span><span class="kpi-slope" style="color:'+c+'">'+sr.perWeek.toFixed(2)+' %/주</span></div>';
    kpiHtml+='<div class="divider"></div>';
    kpiHtml+='<div class="kpi-row"><span class="kpi-label">최종 회수금액</span><span class="kpi-val">'+sa.finalVal.toLocaleString()+'만원</span></div>';
    kpiHtml+='<div class="kpi-row"><span class="kpi-label">기울기 (금액)</span><span class="kpi-slope" style="color:'+c+'">'+Math.round(sa.perWeek).toLocaleString()+' 만원/주</span></div>';
    kpiHtml+='<div class="divider"></div>';
    kpiHtml+='<div class="may-badge">5월 성과</div>';
    kpiHtml+='<div class="kpi-row"><span class="kpi-label">회수율 상승</span><span class="kpi-may" style="color:'+c+';">+'+may.rateInc.toFixed(2)+'%p</span></div>';
    kpiHtml+='<div class="kpi-row"><span class="kpi-label">회수금액</span><span class="kpi-may" style="color:'+c+';">'+may.amountMan.toLocaleString()+'만원</span></div>';
    if(single)kpiHtml+='<div style="font-size:10px;color:#bbb;margin-top:3px;">※ 단일 이벤트</div>';
    kpiHtml+='</div>';
  });
  document.getElementById('kpi-grid').innerHTML=kpiHtml;
})();
</script>
