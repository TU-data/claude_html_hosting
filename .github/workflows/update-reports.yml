name: Update reports.json

on:
  push:
    paths:
      - 'reports/**/*.html'
    branches:
      - main

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate reports.json
        run: python3 scripts/scan_all.py

      - name: Commit updated reports.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports.json
          git diff --cached --quiet && echo "reports.json unchanged, skipping commit" || git commit -m "auto: update reports.json"
          git push
